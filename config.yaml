alpaca:
  paper: true
  data_feed: iex          # iex | sip (free tier = IEX only)

account:
  risk_pct_per_trade: 1.0
  max_position_pct: 10.0

risk_guard:
  max_daily_loss_pct: 2.0        # realized daily loss >= 2% equity -> no new entries today
  max_monthly_loss_pct: 4.0      # realized monthly loss >= 4% equity -> no new entries this month
  consecutive_losses_to_halve: 3 # after 3 straight losers -> risk% halved until a winner
  max_trades_per_day: 5
  no_entries_before_et: "09:45"  # skip opening chop
  no_new_entries_after_et: "15:00"
  monthly_target_pct: 2.0        # tracking/reporting only, not a promise
  high_vol_annualized_pct: 25.0  # SPY realized vol (10d, annualized) above this -> risk halved

telegram:
  enabled: true

schedule:
  timezone: "America/New_York"
  cycle_minutes: 15
  force_close_time_et: "15:55"

scanner:
  universe_cache_path: "sp500.json"
  universe_cache_max_age_days: 7
  top_n_gappers: 20
  daily_bar_lookback_days: 400

paths:
  db_path: "bot.db"
  rules_path: "rules.json"
  dashboard_output_path: "dashboard.html"
  log_file: "bot.log"

logging:
  level: "INFO"
